services:
  - type: web
    name: deepseek-chatbot
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npm --prefix client install && npm --prefix client run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: chatbot-data
      mountPath: /var/data
      sizeGB: 1
